<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG IN</title>
    <link rel="stylesheet" href="/login/style.css">
</head>
<body>
    <div class="outer-box">
        <div class="login-container">
            <div class="title-box">
                LOG IN
            </div>
            
            <form>
                <div class="input-group">
                    <label>USERNAME</label>
                    <input type="text" placeholder="Enter your username" class="username-input">
                </div>
                
                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" placeholder="Enter your password" class="password-input">
                </div>
                
                <button type="submit" class="login-btn">LOGIN</button>
            </form>
            
            <div class="footer">
                <span>DONT HAVE AN ACCOUNT?</span>
                <a href="register/register.html"><button class="register-btn">REGISTER</button></a>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="/login/login.js"></script>
</body>
</html>
